<!doctype html>
<html>
<head>
  <title>My Support Queries</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
<div class="container py-5">

<h2 class="mb-4">My Support Queries</h2>

<table class="table table-dark table-hover">
  <thead>
    <tr>
      <th>Subject</th>
      <th>Status</th>
      <th>Admin Reply</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody>
    {% for q in queries %}
      <tr>
        <td>{{ q.subject }}</td>
        <td>{{ q.status }}</td>
        <td>
          {% if q.admin_reply %}
            {{ q.admin_reply }}
          {% else %}
            <span class="text-muted">Awaiting reply</span>
          {% endif %}
        </td>
        <td>{{ q.created_at|date:"Y-m-d" }}</td>
      </tr>
    {% empty %}
      <tr><td colspan="4" class="text-center">No queries submitted.</td></tr>
    {% endfor %}
  </tbody>
</table>

<a href="{% url 'dashboard' %}" class="btn btn-outline-light">Back to Dashboard</a>

</div>
</body>
</html>
