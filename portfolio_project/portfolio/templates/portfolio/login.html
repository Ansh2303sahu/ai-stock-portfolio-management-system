<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | STOCKINTEL</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: radial-gradient(1200px 600px at 20% 10%, rgba(13,110,253,.12), transparent),
                  radial-gradient(900px 500px at 90% 20%, rgba(25,135,84,.12), transparent),
                  #0b1220;
      color: #e9eefb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .glass {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      position: relative;
      overflow: hidden;
    }

    /* Soft highlight */
    .glass:before {
      content: "";
      position: absolute;
      top: -120px;
      left: -120px;
      width: 260px;
      height: 260px;
      background: rgba(13,110,253,.18);
      filter: blur(50px);
      border-radius: 999px;
      pointer-events: none;
    }

    .form-control {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      color: #e9eefb;
    }

    .form-control:focus {
      background: rgba(255,255,255,.12);
      color: #e9eefb;
      border-color: #0d6efd;
      box-shadow: none;
    }

    .form-label {
      color: rgba(233,238,251,.85);
    }

    .muted {
      color: rgba(233,238,251,.72);
    }

    a {
      color: #9ec5fe;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Premium Logo */
.logo-wrap {
  width: 72px;
  height: 72px;
  border-radius: 20px;
  padding: 4px;
  background: linear-gradient(
    135deg,
    rgba(13,110,253,.55),
    rgba(25,135,84,.55)
  );
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.12),
    0 20px 50px rgba(0,0,0,.45);
  animation: logoFloat 4s ease-in-out infinite;
}

.logo-core {
  width: 100%;
  height: 100%;
  border-radius: 16px;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), transparent 55%),
    linear-gradient(160deg, #0d6efd, #0b5ed7);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 1.4rem;
  letter-spacing: .12em;
  color: #e9eefb;
  text-shadow: 0 2px 10px rgba(0,0,0,.6);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.18),
    inset 0 -8px 18px rgba(0,0,0,.35);
  position: relative;
  overflow: hidden;
}

/* Light sweep animation */
.logo-core::after {
  content: "";
  position: absolute;
  inset: -40%;
  background: linear-gradient(
    120deg,
    transparent 40%,
    rgba(255,255,255,.18) 50%,
    transparent 60%
  );
  transform: translateX(-100%);
  animation: logoShine 3.5s ease-in-out infinite;
}

/* Animations */
@keyframes logoFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

@keyframes logoShine {
  0% { transform: translateX(-120%); }
  60% { transform: translateX(-120%); }
  100% { transform: translateX(120%); }
}


    /* Animations */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 10px 30px rgba(0,0,0,.35); }
      50%      { box-shadow: 0 14px 40px rgba(13,110,253,.22); }
    }

    .animate-title {
      animation: fadeSlideIn .7s ease-out both;
    }

    .animate-tagline {
      animation: fadeSlideIn .9s ease-out both;
    }

    .logo {
      animation: glowPulse 2.6s ease-in-out infinite;
    }

    .version {
      font-size: .85rem;
      color: rgba(233,238,251,.6);
      margin-top: .4rem;
    }

    .divider {
      border-color: rgba(255,255,255,.15) !important;
    }
  </style>
</head>

<body>
  <div class="glass">

    <!-- Header / Branding -->
    <div class="text-center mb-4">
      <div class="d-flex justify-content-center mb-3">
        <div class="logo">SI</div>
      </div>

      <h2 class="fw-bold animate-title mb-1">STOCKINTEL</h2>
      <p class="muted animate-tagline mb-0">
        AI-Powered Portfolio Insights & Smart Decision Support
      </p>
      <div class="version">v1.0 • Stock Portfolio Management Platform</div>
    </div>

    <!-- Login form -->
    <form method="post">
      {% csrf_token %}

      {% if form.non_field_errors %}
        <div class="alert alert-danger">
          {{ form.non_field_errors }}
        </div>
      {% endif %}

      <div class="mb-3">
        <label class="form-label">Username</label>
        {{ form.username }}
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        {{ form.password }}
      </div>

      <button class="btn btn-primary w-100 py-2 mt-2 fw-semibold">
        Login
      </button>
    </form>

    <div class="text-center mt-3">
      <span class="muted">Don’t have an account?</span>
      <a href="{% url 'register' %}">Register</a>
    </div>

    <hr class="my-4 divider">

    <div class="text-center">
      <a href="/admin/login/" class="btn btn-outline-warning w-100">
        Admin Login
      </a>
    </div>

  </div>
</body>
</html>
