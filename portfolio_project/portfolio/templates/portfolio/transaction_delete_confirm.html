<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Delete Transaction</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: radial-gradient(1200px 600px at 20% 10%, rgba(13,110,253,.12), transparent),
                  radial-gradient(900px 500px at 90% 20%, rgba(25,135,84,.12), transparent),
                  #0b1220;
      color: #e9eefb;
      min-height: 100vh;
    }
    .glass {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
      border-radius: 18px;
    }
    .muted { color: rgba(233,238,251,.75); }
  </style>
</head>
<body>
  <div class="container py-5" style="max-width: 720px;">
    <div class="glass p-4">
      <h3 class="fw-bold mb-2">Delete Transaction</h3>
      <p class="muted mb-4">
        Are you sure you want to delete this transaction?
      </p>

      <div class="mb-3">
        <div><strong>{{ tx.stock.symbol }}</strong> ({{ tx.stock.name }})</div>
        <div class="muted">Type: {{ tx.transaction_type }} • Qty: {{ tx.quantity }} • Price: ₹ {{ tx.price }} • Date: {{ tx.transaction_date }}</div>
      </div>

      <form method="post" class="d-flex gap-2">
        {% csrf_token %}
        <button class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'transaction_history' %}" class="btn btn-outline-light">Cancel</a>
      </form>
    </div>
  </div>
</body>
</html>
